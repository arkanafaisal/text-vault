services:
  app:
    build:
      context: .
      target: app
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env

  flyway:
    build:
      context: .
      target: flyway
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_DB: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: >
      -validateMigrationNaming=true
      -url=jdbc:mysql://${MYSQL_HOST}:3306/${MYSQL_DB}
      -user=${MYSQL_USER}
      -password=${MYSQL_PASSWORD}
      migrate
