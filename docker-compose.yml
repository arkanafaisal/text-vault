services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file:
      - .env
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    #   redis:
    #     condition: service_healthy
    restart: always

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: always


  # mysql:
  #   image: mysql:8
  #   environment:
