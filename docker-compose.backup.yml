name: textvault

services:
  backup:
    image: databack/mysql-backup
    command: dump mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@host.docker.internal:3306/${MYSQL_DB} local:///backup
    environment:
      DB_DUMP_FREQ: 1440
      DB_DUMP_BEGIN: 0200
      DB_CLEANUP_TIME: 10080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backups:/backup
    restart: unless-stopped


  rclone:
    image: rclone/rclone
    volumes:
      - ./backups:/data
      - ./rclone.conf:/config/rclone/rclone.conf
    entrypoint: /bin/sh
    command: >
      -c "
        while true; do
          rclone sync /data gdrive:db-backups --log-level INFO;
          sleep 3600;
        done
      "
    restart: unless-stopped